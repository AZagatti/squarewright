# Squarewright — Review (TRUSTED phase)
#
# Triggered by the Gather workflow completing (workflow_run). This runs with the BASE repo's permissions and
# secrets, regardless of which fork opened the PR — and it NEVER checks out or executes PR head code. The only
# PR-derived input is the text artifact from Gather, treated purely as data fed to the model.
#
# Security notes baked in:
#   - secrets (provider key) exist ONLY in this workflow, never in Gather.
#   - least-privilege permissions, each justified below.
#   - the artifact's claimed PR/head-sha is cross-checked against the workflow_run event's head_sha before we
#     trust it to decide WHERE to post (a poisoned artifact must not be able to redirect the comment).
#
# Scaffolded by `squarewright init`. The harness it calls is pre-v0.1 (see squarewright ROADMAP).
name: Squarewright - Review

on:
  workflow_run:
    workflows: ["Squarewright - Gather"]
    types: [completed]

permissions:
  contents: read # checkout trusted base only
  actions: read # download the gather artifact
  pull-requests: write # post the review

concurrency:
  group: squarewright-review-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  review:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15 # bound a stuck model call / agent loop — this step now runs a real, keyed model (AGENTS.md money rule); GHA's default is 6h
    steps:
      - name: Checkout base repo (trusted; never PR head)
        uses: actions/checkout@v4

      - name: Download gather artifact (by run-id)
        uses: actions/download-artifact@v4
        with:
          name: squarewright-input
          path: artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      # Put the `squarewright` CLI on the runner: clone the public harness at a pinned ref and run it from source
      # with Bun (no published package yet). `init` pins SQUAREWRIGHT_REF to the squarewright revision that
      # scaffolded this file — change it to a release tag or `main` as you prefer, and ensure the ref is pushed
      # to the public repo. A published action/binary is the v0.1 distribution work (ROADMAP M4).
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install Squarewright (pinned harness)
        env:
          SQUAREWRIGHT_REF: "__SQW_REF__"
        run: |
          git clone --filter=blob:none https://github.com/AZagatti/squarewright "$RUNNER_TEMP/squarewright"
          git -C "$RUNNER_TEMP/squarewright" checkout "$SQUAREWRIGHT_REF"
          (cd "$RUNNER_TEMP/squarewright" && bun install --frozen-lockfile)

      - name: Run Squarewright review and post (safe posting)
        env:
          GH_TOKEN: ${{ github.token }}
          # Trusted workflow_run signals — the ONLY inputs trusted to decide WHERE to post. The gather
          # artifact is untrusted; `--post` cross-checks its claims against these and refuses on any mismatch.
          EVENT_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          EVENT_REPO: ${{ github.event.workflow_run.repository.full_name }}
          # The bot's own comment author, so re-reviews only edit/replace OUR sticky+inline comments, never a
          # third-party's forged-marker comment (issue #157). Under the default GH_TOKEN this is github-actions[bot];
          # change it to your PAT's username or `<app-slug>[bot]` if you post with a PAT or GitHub App instead.
          SQUAREWRIGHT_BOT_LOGIN: "github-actions[bot]"
          # Provider keys live ONLY in this trusted phase. Set the ones matching your .squarewright.yml lanes
          # (ZAI_API_KEY for the default z.ai lanes) plus OPENROUTER_API_KEY for the structurer pass.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
        # Runs from the user's checked-out repo (cwd = workspace) so it reads THIS repo's .squarewright.yml and
        # .review-rules; the harness code + deps come from the pinned clone in RUNNER_TEMP.
        run: bun "$RUNNER_TEMP/squarewright/src/cli.ts" review --phase post --post --input artifacts
