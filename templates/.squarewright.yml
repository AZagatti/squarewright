# Squarewright — reviewer assembly config.
# This is the "customize" height: pick provider/model lanes, personas, budgets. The beginner path can leave
# most of this at defaults and only set a provider key secret. See docs/adr/0001 and docs/ROADMAP.md.

# Provider/model lanes the personas route to. Mechanism is Pi's (~30 providers + custom endpoints); the
# routing *policy* is yours. Swap provider/model freely — the reviewer is model-agnostic.
lanes:
  - id: default
    provider: openrouter
    model: deepseek/deepseek-v3.2
    # thinking/reasoning level; Pi maps it to the provider's knob. off | minimal | low | medium | high | xhigh
    thinking: off

defaultLane: default

# Review lenses. v0.1 ships one solid general persona; add security/accessibility/language-specific personas
# and route them by glob as you grow (see ROADMAP — routing/pairing engine).
personas:
  - id: general
    lane: default
    needsCode: true
    prompt: >-
      You are a careful senior code reviewer. Review only the changes in this PR. Flag correctness bugs,
      security issues, and clear regressions. Ground every finding in the diff and the provided repo context;
      do not speculate. Prefer a few high-signal findings over many nits. For each finding give file, line,
      a short title, why it matters, and (only for exact single-line fixes) a suggested replacement.

# Optional deterministic grounders (polyglot plugins, JSON contract). Off by default — the AI is the center.
grounders: []

# Cost guardrails passed to the Worker.
budget:
  maxToolCalls: 30

# Local feedback loop (👍/👎 + implicit signals) to self-tune reviews. Aggregate telemetry is opt-in and OFF.
feedback:
  enabled: true
  aggregate: false
