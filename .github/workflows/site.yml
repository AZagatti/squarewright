# Deploy the Astro + Starlight site (site/) to GitHub Pages.
# Requires: repo Settings → Pages → Source = GitHub Actions. If this is a PROJECT page (not a user/org page),
# set `base: '/squarewright'` in site/astro.config.mjs so asset URLs resolve.
name: Deploy site

on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/site.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
